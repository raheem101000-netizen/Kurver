<!DOCTYPE html>
<html class="no-js">
    <head>
        <title>Kurver</title>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <meta name="format-detection" content="telephone=no">
        <link rel="stylesheet" href="css/style.css">
        <style>
            /* ── Mode selection overlay ───────────────────────────────────── */
            #kurver-mode {
                position: fixed; inset: 0; z-index: 9999;
                background: #0d0d1a;
                display: flex; flex-direction: column;
                align-items: center; justify-content: center;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            }
            #kurver-mode h1 {
                color: #fff; font-size: 38px; font-weight: 500;
                letter-spacing: 4px; margin-bottom: 6px;
            }
            #kurver-mode p {
                color: rgba(255,255,255,0.35); font-size: 13px;
                margin-bottom: 40px; letter-spacing: 1px;
            }
            .kurver-mode-btns {
                display: flex; flex-direction: column; gap: 12px; align-items: center;
            }
            .kurver-mode-btn {
                width: 260px; padding: 14px 0; border: none; border-radius: 6px;
                font-size: 15px; font-weight: 500; cursor: pointer;
                font-family: inherit; letter-spacing: 1px; transition: opacity .15s;
            }
            .kurver-mode-btn:hover { opacity: .85; }
            .kurver-mode-btn.solo { background: #4CFF6C; color: #111; }
            .kurver-mode-btn.multi { background: #4BA8FF; color: #111; }
            /* ── Scoring overlay (multiplayer) ────────────────────────────── */
            #kurver-score {
                display: none;
                position: fixed; top: 12px; right: 12px; z-index: 8000;
                background: rgba(0,0,0,0.85); border-radius: 8px;
                padding: 12px 16px; min-width: 160px;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                font-size: 12px; color: rgba(255,255,255,0.7);
            }
            #kurver-score-title {
                font-size: 10px; letter-spacing: 2px;
                color: rgba(255,255,255,0.3); margin-bottom: 8px;
            }
            .ks-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
            .ks-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
            .ks-name { flex: 1; }
            .ks-pts  { font-weight: 500; color: #fff; }
            #kurver-score-match { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 8px; }
        </style>
    </head>
    <body ng-app="curvytronApp" ng-controller="CurvytronController">

        <!-- ── Mode selection (shown first, hidden when multiplayer is chosen) ── -->
        <div id="kurver-mode">
            <h1>KURVER</h1>
            <p>choose a mode</p>
            <div class="kurver-mode-btns">
                <button class="kurver-mode-btn solo" onclick="window.location.href='/solo.html'">
                    Solo Challenge
                </button>
                <button class="kurver-mode-btn multi" onclick="enterMultiplayer()">
                    Multiplayer Room
                </button>
            </div>
        </div>

        <!-- ── Curvytron multiplayer app (hidden until mode selected) ───────── -->
        <div id="kurver-app" style="display:none">
            <header>
                <a href="/#/" class="logo animated">
                    <span class="brand">kurver</span>
                </a>
            </header>

            <div ng-controller="ProfileController" ng-if="profile">
                <ng-include src="'js/views/profile/link.html'"></ng-include>
                <div id="profile" class="panel" ng-include="'js/views/profile/profile.html'" onload="onLoaded()"></div>
            </div>

            <div id="connecting" ng-if="status === 'connecting'" class="container text-center">
                <h3>Connecting...</h3>
            </div>

            <div id="main" ng-if="status === 'online'" ng-view></div>

            <div id="error" ng-if="status === 'disconnected'" class="container text-center">
                <section class="centered">
                    <h3>Connection lost</h3>
                    <p>Unable to reach the server.</p>
                    <button ng-click="reload()" class="btn btn-default">Try again</button>
                </section>
            </div>

            <footer>
                <div class="container">
                    <div class="row">
                        <div class="col-lg-12 no-padding-bottom text-center">
                            <a href="#" onclick="showModeScreen();return false"
                               style="color:rgba(255,255,255,0.3);font-size:12px">
                                ← Back to mode selection
                            </a>
                        </div>
                    </div>
                </div>
            </footer>
        </div>

        <!-- ── Kurver scoring overlay (shown during multiplayer games) ───────── -->
        <div id="kurver-score">
            <div id="kurver-score-title">KURVER SCORES</div>
            <div id="kurver-score-rows"></div>
            <div id="kurver-score-match">Match 1 / 10</div>
        </div>

        <script src="js/dependencies.js"></script>
        <script src="js/curvytron.js"></script>
        <script src="js/kurver-scoring.js"></script>
        <script>
            function enterMultiplayer() {
                document.getElementById('kurver-mode').style.display = 'none';
                document.getElementById('kurver-app').style.display  = 'block';
            }
            function showModeScreen() {
                document.getElementById('kurver-mode').style.display = 'flex';
                document.getElementById('kurver-app').style.display  = 'none';
                document.getElementById('kurver-score').style.display = 'none';
            }
        </script>
    </body>
</html>
