<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kurve BR</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #f0f0f0; font-family: 'Courier New', monospace; }

  #screens > div { display: none; }
  #screens > div.active { display: flex; }

  /* ── Home ── */
  #home {
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  #home h1 { font-size: 3rem; letter-spacing: 6px; color: #e74c3c; text-shadow: 0 0 20px #e74c3c88; }
  #home p { color: #888; font-size: 0.9rem; }
  .btn {
    padding: 12px 32px;
    border: 2px solid currentColor;
    background: transparent;
    color: #f0f0f0;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    letter-spacing: 2px;
    transition: background 0.15s, color 0.15s;
  }
  .btn:hover { background: #f0f0f0; color: #0d0d0d; }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn:disabled:hover { background: transparent; color: #f0f0f0; }
  .btn.primary { color: #e74c3c; border-color: #e74c3c; }
  .btn.primary:hover { background: #e74c3c; color: #0d0d0d; }
  input[type=text] {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #f0f0f0;
    padding: 10px 16px;
    font-family: inherit;
    font-size: 1rem;
    width: 260px;
    text-align: center;
  }
  input[type=text]:focus { outline: none; border-color: #e74c3c; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .row label { color: #888; font-size: 0.8rem; letter-spacing: 1px; }

  /* ── Lobby ── */
  #lobby {
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  #lobby h2 { font-size: 1.4rem; letter-spacing: 3px; color: #e74c3c; }
  #room-code-display {
    font-size: 2rem;
    letter-spacing: 6px;
    color: #f0f0f0;
    cursor: pointer;
    border-bottom: 1px dashed #555;
    padding-bottom: 4px;
  }
  #room-code-display:hover::after { content: ' 📋'; font-size: 1rem; }
  .player-list { display: flex; flex-direction: column; gap: 8px; width: 300px; }
  .player-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    background: #1a1a1a;
    border-left: 3px solid transparent;
  }
  .player-row .dot {
    width: 14px; height: 14px; border-radius: 50%;
  }
  .player-row .pname { flex: 1; font-size: 0.9rem; }
  .player-row .tag { font-size: 0.7rem; color: #888; margin-left: auto; }
  #lobby-status { font-size: 0.8rem; color: #888; }
  #lobby-error { color: #e74c3c; font-size: 0.85rem; min-height: 20px; }

  /* ── Game ── */
  #game {
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    gap: 0;
  }
  #hud {
    width: 800px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 0.75rem;
    color: #888;
  }
  #hud-players { display: flex; gap: 12px; }
  .hud-p { display: flex; align-items: center; gap: 4px; }
  .hud-p .dot { width: 8px; height: 8px; border-radius: 50%; }
  .hud-p.dead { opacity: 0.3; text-decoration: line-through; }
  #canvas { display: block; border: 1px solid #222; }
  #zone-timer { font-size: 0.75rem; color: #e74c3c; }

  /* ── Results ── */
  #results {
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  #results h2 { font-size: 1.8rem; letter-spacing: 4px; color: #f0f0f0; }
  .result-list { display: flex; flex-direction: column; gap: 8px; width: 320px; }
  .result-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: #1a1a1a;
    border-left: 3px solid transparent;
  }
  .result-row .place { font-size: 1.2rem; width: 28px; text-align: center; }
  .result-row .rname { flex: 1; }
  .result-row.winner { border-color: #f39c12; }
  .result-row.winner .place { color: #f39c12; }
  #winner-banner { text-align: center; }
  #winner-banner .big { font-size: 1.4rem; color: #f39c12; }
  #winner-banner .prize { font-size: 0.9rem; color: #888; margin-top: 4px; }
  #rematch-status { font-size: 0.85rem; color: #888; min-height: 20px; text-align: center; }
  #rematch-countdown { font-size: 2rem; color: #e74c3c; min-height: 48px; text-align: center; }

  /* ── Spectator banner ── */
  #spectator-banner {
    position: fixed; top: 0; left: 0; right: 0;
    background: #e74c3c; color: #fff;
    text-align: center; padding: 6px;
    font-size: 0.8rem; letter-spacing: 2px;
    z-index: 100; display: none;
  }
  #spectator-banner.active { display: block; }

  @media (max-width: 840px) {
    #hud, #canvas { width: 100vw !important; }
    #canvas { height: auto !important; }
  }
</style>
</head>
<body>

<div id="spectator-banner">SPECTATOR MODE — watching live</div>

<div id="screens">

  <!-- Home -->
  <div id="home" class="active">
    <h1>KURVE BR</h1>
    <p>Multiplayer curve fever — last one alive wins the pot</p>
    <div class="row">
      <label>YOUR NAME</label>
      <input id="home-name" type="text" placeholder="enter name" maxlength="16" autocomplete="off">
    </div>
    <div class="row">
      <button class="btn primary" id="btn-create">CREATE ROOM</button>
    </div>
    <div class="row">
      <input id="join-code" type="text" placeholder="KURVE-XXXX" maxlength="10" style="width:180px" autocomplete="off">
      <button class="btn" id="btn-join">JOIN</button>
      <button class="btn" id="btn-spectate">WATCH</button>
    </div>
    <div id="home-error" style="color:#e74c3c;font-size:0.85rem;min-height:20px;"></div>
  </div>

  <!-- Lobby -->
  <div id="lobby">
    <h2>LOBBY</h2>
    <div id="room-code-display" title="Click to copy"></div>
    <div class="player-list" id="lobby-player-list"></div>
    <div id="lobby-status"></div>
    <div id="lobby-error"></div>
    <button class="btn primary" id="btn-start" style="display:none">START GAME</button>
    <button class="btn" id="btn-leave-lobby">LEAVE LOBBY</button>
  </div>

  <!-- Game -->
  <div id="game">
    <div id="hud">
      <div id="hud-players"></div>
      <div id="zone-timer"></div>
    </div>
    <canvas id="canvas" width="800" height="600"></canvas>
  </div>

  <!-- Results -->
  <div id="results">
    <h2>RESULTS</h2>
    <div id="winner-banner"></div>
    <div class="result-list" id="result-list"></div>
    <div id="rematch-status"></div>
    <div id="rematch-countdown"></div>
    <div class="row">
      <button class="btn primary" id="btn-rematch">REMATCH</button>
      <button class="btn" id="btn-home">MAIN MENU</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/game.js"></script>
</body>
</html>
